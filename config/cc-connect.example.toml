language = "zh"
data_dir = "~/.cc-connect/data"

# 附件回传
attachment_send = "on"

# 静默模式：隐藏思考过程和工具调用，只向用户发送纯对话内容
quiet = true

# 显示设置（0 = 不显示）
[display]
thinking_max_len = 0
tool_max_len = 0

# 速率限制（防刷）
[rate_limit]
max_per_minute = 10
max_per_hour = 60

[[projects]]
name = "lin-meimei"
work_dir = "~/.qclaw/workspace"
quiet = true

[projects.agent]
type = "claudecode"
  [projects.agent.options]
  mode = "bypassPermissions"

[[projects.platforms]]
type = "weixin"

[projects.platforms.options]
token = ""          # cc-connect weixin setup 后自动填入
allow_from = "*"    # 生产环境改为具体用户ID
base_url = "https://ilinkai.weixin.qq.com"
account_id = ""     # setup 后自动填入
